<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>YKS Soru Robotu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 450px; text-align: center; border: 1px solid #333; }
        input { width: 85%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; outline: none; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        #soruBtn { background-color: #f68b1e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #cevapBtn { background-color: #4a4a4a; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; display: none; }
        #response, #answerBox { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: left; line-height: 1.5; }
        #response { background: #2a2a2a; border-left: 4px solid #f68b1e; }
        #answerBox { background: #1b3a1b; border-left: 4px solid #28a745; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 YKS Soru Robotu</h2>
    <p>Konu yaz, ÖSYM tarzı soru gelsin!</p>
    <input type="text" id="userInput" placeholder="Örn: Vektörler, Fotosentez, Gazlar...">
    
    <div class="btn-group">
        <button onclick="soruSor()" id="soruBtn">Yeni Soru Oluştur</button>
        <button onclick="cevabıGoster()" id="cevapBtn">Cevabı Gör</button>
    </div>

    <div id="response">Soru burada görünecek...</div>
    <div id="answerBox"></div>
</div>

<script>
    // Groq sitesinden aldığın gsk_ ile başlayan kodu buraya yapıştır
    const API_KEY = "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"; 
    let sonCevap = ""; // Cevabı saklamak için değişken

    async function soruSor() {
        const input = document.getElementById("userInput").value;
        const responseDiv = document.getElementById("response");
        const answerBox = document.getElementById("answerBox");
        const cevapBtn = document.getElementById("cevapBtn");
        
        if (!input) return alert("Lütfen bir konu yaz!");

        responseDiv.innerText = "YKS sorusu hazırlanıyor...";
        answerBox.style.display = "none";
        cevapBtn.style.display = "none";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user",
                        content: `Sen deneyimli bir YKS öğretmenisin. Kullanıcının verdiği "${input}" konusuyla ilgili 11. sınıf müfredatına uygun, ÖSYM tarzı, çoktan seçmeli (A,B,C,D,E şıklı) bir soru hazırla. Sorunun sonunda mutlaka "CEVAP:" etiketiyle doğru şıkkı ve kısa çözümünü yaz.`
                    }]
                })
            });

            const data = await response.json();
            const fullText = data.choices[0].message.content;

            // Soru ve cevabı ayır
            const parts = fullText.split("CEVAP:");
            responseDiv.innerText = parts[0].trim();
            sonCevap = parts[1] ? parts[1].trim() : "Çözüm hazırlanamadı.";

            cevapBtn.style.display = "block"; // Soruyu alınca cevap butonunu göster
        } catch (error) {
            responseDiv.innerText = "Bağlantı hatası! Anahtarı kontrol et.";
        }
    }

    function cevabıGoster() {
        const answerBox = document.getElementById("answerBox");
        answerBox.innerHTML = "<b>✅ Doğru Cevap & Çözüm:</b><br>" + sonCevap;
        answerBox.style.display = "block";
    }
</script>

</body>
</html>

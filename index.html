<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11. Sınıf Sosyal YKS Paneli</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #3b82f6; --yks: #f68b1e; --chat: #8b5cf6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* 1. VE 2. ÖZELLİK: SORU MAKİNESİ (ÜST PANEL) */
        .yks-container { background: var(--panel); border-radius: 15px; width: 100%; max-width: 500px; padding: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; outline: none; }
        .btn-yks { background: var(--yks); color: white; border: none; padding: 12px; border-radius: 8px; width: 92%; cursor: pointer; font-weight: bold; font-size: 1rem; }
        #cevapBtn { background: #4a4a4a; color: white; border: none; padding: 10px; border-radius: 8px; width: 92%; margin-top: 10px; cursor: pointer; display: none; }
        #soruAlani { margin-top: 20px; text-align: left; background: #2a2a2a; padding: 15px; border-radius: 10px; border-left: 5px solid var(--yks); line-height: 1.5; }
        
        /* DİREKT EKRANDA GÖRÜNEN ÇÖZÜM KUTUSU */
        #cozumAlani { margin-top: 15px; background: #1b3a1b; padding: 15px; border-radius: 10px; border-left: 5px solid #28a745; text-align: left; display: none; font-size: 0.9rem; }

        /* 4. ÖZELLİK: ARKADAŞLARLA SOHBET (ALT PANEL) */
        .global-chat { background: var(--panel); border-radius: 15px; width: 100%; max-width: 500px; height: 300px; display: flex; flex-direction: column; border: 1px solid var(--chat); overflow: hidden; }
        .chat-header { background: var(--chat); padding: 10px; text-align: center; font-weight: bold; }
        #messageList { flex: 1; padding: 15px; overflow-y: auto; background: #111; display: flex; flex-direction: column; gap: 5px; }
        .msg-line { font-size: 0.9rem; background: #222; padding: 5px 10px; border-radius: 5px; border: 1px solid #333; }

        /* 3. ÖZELLİK: AI ASİSTAN (SAĞ ALT BALON) */
        #ai-bubble { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; }
        #ai-box { position: fixed; bottom: 85px; right: 20px; width: 300px; height: 400px; background: var(--panel); border-radius: 15px; border: 1px solid var(--accent); display: none; flex-direction: column; z-index: 1000; }
    </style>
</head>
<body>

    <h2 style="color: var(--yks);">🎓 11. Sınıf Sosyal Çalışma Paneli</h2>

    <div class="yks-container">
        <h3>📝 YKS Soru Robotu</h3>
        <input type="text" id="konuInput" placeholder="Enerji, Mol, Vektörler...">
        <button class="btn-yks" onclick="soruGetir()">Yeni Soru Oluştur</button>
        <div id="soruAlani">Konu yazıp butona bas...</div>
        
        <button id="cevapBtn" onclick="cozumuEkranaBas()">Çözümü Gör</button>
        <div id="cozumAlani"></div>
    </div>

    <div class="global-chat">
        <div class="chat-header">💬 Arkadaşlarla Sohbet Odası</div>
        <div id="messageList">
            <div class="msg-line"><b style="color:var(--chat)">Sistem:</b> Hoş geldin!</div>
        </div>
        <div style="display: flex; padding: 10px; gap: 5px; background: #1a1a1a;">
            <input type="text" id="chatInput" placeholder="Mesajın..." style="margin:0; flex:1;">
            <button onclick="mesajGonder()" style="background:var(--chat); border:none; color:white; border-radius:5px; padding:0 15px; cursor:pointer">Gönder</button>
        </div>
    </div>

    <div id="ai-box">
        <div style="background:var(--accent); padding:10px; text-align:center; font-weight:bold;">🤖 AI Asistanı</div>
        <div id="aiChat" style="flex:1; padding:10px; overflow-y:auto; font-size:0.85rem;"></div>
        <div style="display:flex; padding:10px; gap:5px; border-top:1px solid #333;">
            <input type="text" id="aiMsgInput" placeholder="AI'ya sor..." style="margin:0;">
            <button onclick="aiSor()" style="background:var(--accent); border:none; color:white; border-radius:5px">Sor</button>
        </div>
    </div>
    <div id="ai-bubble" onclick="toggleAI()">🧠</div>

<script>
    // GROQ ANAHTARINI BURAYA YAPIŞTIR
    const API_KEY = "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"; 
    let sakliCevap = "";

    async function soruGetir() {
        const konu = document.getElementById("konuInput").value || "11. Sınıf";
        const alan = document.getElementById("soruAlani");
        const cBtn = document.getElementById("cevapBtn");
        const cAlan = document.getElementById("cozumAlani");

        alan.innerText = "Yapay zeka soruyu hazırlıyor...";
        cBtn.style.display = "none";
        cAlan.style.display = "none";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: `Sen 11. sınıf öğretmenisin. Sadece Türkçe konuş. ${konu} konusuyla ilgili YKS tarzı şıklı bir soru yaz. En sona mutlaka CEVAP: yazıp çözümünü ekle.` }]
                })
            });
            const data = await res.json();
            const text = data.choices[0].message.content;
            const parts = text.split("CEVAP:");
            
            alan.innerText = parts[0].trim();
            sakliCevap = parts[1] ? parts[1].trim() : "Çözüm şu an hazırlanamadı.";
            
            cBtn.style.display = "block";
        } catch (e) { alan.innerText = "Bağlantı hatası!"; }
    }

    function cozumuEkranaBas() {
        const cAlan = document.getElementById("cozumAlani");
        cAlan.innerHTML = "<b>✅ Doğru Cevap & Çözüm:</b><br>" + sakliCevap;
        cAlan.style.display = "block";
        document.getElementById("cevapBtn").style.display = "none";
    }

    // Sohbet ve AI Fonksiyonları (Aynı kaldı)
    function mesajGonder() {
        const inp = document.getElementById("chatInput");
        if(!inp.value) return;
        document.getElementById("messageList").innerHTML += `<div class="msg-line"><b>Siz:</b> ${inp.value}</div>`;
        inp.value = "";
        document.getElementById("messageList").scrollTop = document.getElementById("messageList").scrollHeight;
    }

    function toggleAI() {
        const box = document.getElementById("ai-box");
        box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    async function aiSor() {
        const inp = document.getElementById("aiMsgInput");
        const box = document.getElementById("aiChat");
        if(!inp.value) return;
        box.innerHTML += `<div><b>Siz:</b> ${inp.value}</div>`;
        const q = inp.value; inp.value = "";
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "Türkçe konuşan 11. sınıf yardımcısı." }, { role: "user", content: q }]
                })
            });
            const d = await res.json();
            box.innerHTML += `<div style="color:var(--accent)"><b>AI:</b> ${d.choices[0].message.content}</div>`;
            box.scrollTop = box.scrollHeight;
        } catch (e) { box.innerHTML += "<div>Hata!</div>"; }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Süper Hızlı Soru Botu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #121212; color: white; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; text-align: center; border: 1px solid #333; }
        input { width: 85%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; border-radius: 10px; background: #252525; color: white; outline: none; }
        button { padding: 12px 25px; background-color: #f68b1e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 92%; }
        #response { margin-top: 25px; padding: 15px; background: #2a2a2a; border-radius: 10px; min-height: 50px; text-align: left; line-height: 1.5; border-left: 4px solid #f68b1e; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Groq Hızlı Soru Botu</h2>
    <p>Bir konu yaz, anında 11. sınıf sorusu gelsin.</p>
    <input type="text" id="userInput" placeholder="Örn: Vektörler, Mol...">
    <button onclick="soruSor()" id="sendBtn">Hızlı Sor</button>
    <div id="response">Cevap bekleniyor...</div>
</div>

<script>
    // Groq'tan aldığın gsk_ ile başlayan kodu buraya yapıştır
    const API_KEY = "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"; 

    async function soruSor() {
        const input = document.getElementById("userInput").value;
        const responseDiv = document.getElementById("response");
        
        if (!input) return alert("Boş bırakma!");
        responseDiv.innerText = "Yıldırım hızıyla düşünülüyor...";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Çok güçlü bir model
                    messages: [{
                        role: "user",
                        content: `Sen bir öğretmensin. "${input}" konusuyla ilgili 11. sınıf seviyesinde düşündürücü bir soru sor.`
                    }]
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0]) {
                responseDiv.innerText = "🤖 Soru: " + data.choices[0].message.content;
            } else {
                responseDiv.innerText = "Hata: Anahtarı yanlış yapıştırmış olabilirsin.";
            }

        } catch (error) {
            responseDiv.innerText = "Bağlantı kurulamadı!";
            console.error(error);
        }
    }
</script>

</body>
</html>

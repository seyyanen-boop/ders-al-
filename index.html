<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gerçek Yapay Zeka Destekli 11. Sınıf Botu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #e5e5e5; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        input { width: 80%; padding: 12px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        button { padding: 12px 25px; background-color: #4285f4; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        #response { margin-top: 25px; padding: 15px; background: #f9f9f9; border-radius: 10px; min-height: 50px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>11. Sınıf Soru Botu 🧠</h2>
    <p>Herhangi bir kavram yaz, yapay zeka sana sorusunu sorsun.</p>
    <input type="text" id="userInput" placeholder="Örn: Modern Atom Teorisi, Limit, Tork...">
    <br>
    <button onclick="soruSor()" id="sendBtn">Soru Oluştur</button>
    <div id="response" id="aiOutput">Yapay zeka hazır, senden bir kelime bekliyor...</div>
</div>

<script>
    // DİKKAT: Buraya kendi API anahtarını yapıştırmalısın!
    const API_KEY = "AIzaSyBKYT5w6VdZu7zqgc-S-5xZDDY5oloayyk"; 

    async function soruSor() {
        const input = document.getElementById("userInput").value;
        const responseDiv = document.getElementById("response");
        const btn = document.getElementById("sendBtn");

        if (!input) return alert("Lütfen bir kelime gir!");

        responseDiv.innerText = "Düşünüyorum...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `Sen 11. sınıf seviyesinde bir öğretmensin. Sana verilen kavramla ilgili, öğrencinin bilgisini test edecek, "A mı yoksa B mi?" tarzında veya düşündürücü, kısa bir soru sor. Kavram: ${input}` }]
                    }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            responseDiv.innerText = aiText;
        } catch (error) {
            responseDiv.innerText = "Bir hata oluştu. API anahtarını kontrol et!";
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

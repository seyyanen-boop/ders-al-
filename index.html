<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>11. Sınıf Yapay Zeka Botu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        input { width: 85%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        button { padding: 12px 25px; background-color: #4285f4; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 92%; transition: 0.3s; }
        button:hover { background-color: #357ae8; }
        button:disabled { background-color: #ccc; }
        #response { margin-top: 25px; padding: 15px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 10px; min-height: 50px; color: #333; text-align: left; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧠 11. Sınıf Soru Robotu</h2>
    <p>Bir konu yaz (Örn: Tork, Modern Atom Teorisi, Gazlar...)</p>
    <input type="text" id="userInput" placeholder="Kavramı buraya yazın...">
    <button onclick="soruSor()" id="sendBtn">Yapay Zekaya Sor</button>
    <div id="response">Burada yapay zekanın sorusu görünecek...</div>
</div>

<script>
    // ÖNEMLİ: API anahtarını tırnakların içine yapıştır!
    const API_KEY = "AIzaSyBKYT5w6VdZu7zqgc-S-5xZDDY5oloayyk".trim(); 

    async function soruSor() {
        const input = document.getElementById("userInput").value;
        const responseDiv = document.getElementById("response");
        const btn = document.getElementById("sendBtn");

        if (!input) {
            responseDiv.innerText = "Lütfen bir kelime yaz!";
            return;
        }

        responseDiv.innerText = "Yapay zeka düşünüyor ve 11. sınıf müfredatını tarıyor...";
        btn.disabled = true;

        try {
            // URL yapısı çok hassastır, buraya dokunma:
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `Sen 11. sınıf öğrencilerine yardımcı olan bir öğretmensin. Kullanıcı sana bir kavram gönderecek. Sen bu kavramla ilgili 11. sınıf seviyesinde, öğrenciyi düşündürecek kısa ve öz bir soru sor. Soru tek bir cümle olsun. Kavram: ${input}` }]
                    }]
                })
            });

            const data = await response.json();

            // Hata Kontrolü
            if (data.error) {
                if (data.error.status === "INVALID_ARGUMENT") {
                    responseDiv.innerText = "Hata: API Anahtarın geçersiz görünüyor!";
                } else {
                    responseDiv.innerText = "Google Hatası: " + data.error.message;
                }
                return;
            }

            // Başarılı yanıtı ekrana yazdır
            const aiText = data.candidates[0].content.parts[0].text;
            responseDiv.innerText = "🤖 AI: " + aiText;

        } catch (error) {
            responseDiv.innerText = "Bağlantı kurulamadı. İnternetini kontrol et!";
            console.error("Hata detayı:", error);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

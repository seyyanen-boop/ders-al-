<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11. Sınıf Sosyal YKS Paneli</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --accent: #3b82f6; --yks: #f68b1e; --chat: #8b5cf6; }
        
        /* MOBİL UYUMLULUK AYARLARI */
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .container-wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

        /* PANEL TASARIMLARI */
        .card { background: var(--panel); border-radius: 15px; padding: 20px; border: 1px solid #333; box-shadow: 0 5px 20px rgba(0,0,0,0.4); text-align: center; }
        
        input, button { font-size: 16px; } /* Mobil cihazlarda otomatik zoom yapmaması için 16px */
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; outline: none; }
        
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 95%; }
        .btn-yks { background: var(--yks); color: white; }
        .btn-cevap { background: #4a4a4a; color: white; margin-top: 10px; display: none; }
        
        #soruAlani { margin-top: 15px; text-align: left; background: #2a2a2a; padding: 15px; border-radius: 10px; border-left: 5px solid var(--yks); line-height: 1.5; font-size: 0.95rem; }
        #cozumAlani { margin-top: 15px; background: #1b3a1b; padding: 15px; border-radius: 10px; border-left: 5px solid #28a745; text-align: left; display: none; font-size: 0.9rem; }

        /* GLOBAL SOHBET */
        .global-chat { background: var(--panel); border-radius: 15px; height: 350px; display: flex; flex-direction: column; border: 1px solid var(--chat); overflow: hidden; }
        .chat-header { background: var(--chat); padding: 10px; font-weight: bold; }
        #messageList { flex: 1; padding: 15px; overflow-y: auto; background: #111; display: flex; flex-direction: column; gap: 5px; text-align: left; }
        .msg-line { font-size: 0.85rem; background: #222; padding: 6px; border-radius: 5px; border: 1px solid #333; word-wrap: break-word; }

        /* AI ASİSTAN BALONU */
        #ai-bubble { position: fixed; bottom: 15px; right: 15px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; font-size: 20px; }
        #ai-box { position: fixed; bottom: 75px; right: 15px; width: 85%; max-width: 300px; height: 380px; background: var(--panel); border-radius: 15px; border: 1px solid var(--accent); display: none; flex-direction: column; z-index: 1000; box-shadow: 0 5px 25px rgba(0,0,0,0.5); }

        /* MOBİL ÖZEL AYARI */
        @media (max-width: 480px) {
            body { padding: 5px; }
            .card { padding: 15px; }
            #ai-box { width: 90%; right: 5%; }
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <div class="card">
            <h3 style="color:var(--yks); margin:0 0 10px 0;">📝 YKS Soru Robotu</h3>
            <input type="text" id="konuInput" placeholder="Konu yazın...">
            <button class="btn btn-yks" onclick="soruGetir()">Yeni Soru Oluştur</button>
            <div id="soruAlani">Soru bekleniyor...</div>
            <button id="cevapBtn" class="btn btn-cevap" onclick="cozumuGoster()">Çözümü Gör</button>
            <div id="cozumAlani"></div>
        </div>

        <div class="global-chat">
            <div class="chat-header">💬 Sosyal Sohbet Odası</div>
            <div id="messageList">
                <div class="msg-line"><b>Sistem:</b> Hoş geldiniz!</div>
            </div>
            <div style="padding: 10px; background: #1a1a1a; display: flex; flex-direction: column; gap: 5px;">
                <input type="text" id="userName" placeholder="Adınız nedir?" style="margin:0; width:92%;">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chatInput" placeholder="Mesajınız..." style="margin:0; flex:1;">
                    <button onclick="mesajGonder()" style="background:var(--chat); border:none; color:white; border-radius:5px; padding:0 10px; cursor:pointer">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="ai-box">
        <div style="background:var(--accent); padding:10px; text-align:center; font-weight:bold;">🤖 AI Asistanı</div>
        <div id="aiChat" style="flex:1; padding:10px; overflow-y:auto; font-size:0.85rem; background:#111;"></div>
        <div style="display:flex; padding:8px; gap:5px; background:#1e1e1e;">
            <input type="text" id="aiMsgInput" placeholder="Sor..." style="margin:0; font-size:14px;">
            <button onclick="aiSor()" style="background:var(--accent); border:none; color:white; border-radius:5px; padding:0 10px;">GÖNDER</button>
        </div>
    </div>
    <div id="ai-bubble" onclick="toggleAI()">🧠</div>

<script>
    const API_KEY = "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"; 
    let sakliCevap = "";

    // SORU SİSTEMİ
    async function soruGetir() {
        const konu = document.getElementById("konuInput").value || "11. Sınıf";
        document.getElementById("soruAlani").innerText = "Hazırlanıyor...";
        document.getElementById("cevapBtn").style.display = "none";
        document.getElementById("cozumAlani").style.display = "none";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: `Sen 11. sınıf öğretmenisin. Sadece Türkçe konuş. ${konu} konusuyla ilgili YKS tarzı şıklı bir soru yaz. Sonunda mutlaka CEVAP: yazıp çözümünü ekle.` }]
                })
            });
            const data = await res.json();
            const text = data.choices[0].message.content;
            const parts = text.split("CEVAP:");
            document.getElementById("soruAlani").innerText = parts[0].trim();
            sakliCevap = parts[1] ? parts[1].trim() : "Çözüm yok.";
            document.getElementById("cevapBtn").style.display = "block";
        } catch (e) { document.getElementById("soruAlani").innerText = "Hata!"; }
    }

    function cozumuGoster() {
        const cAlan = document.getElementById("cozumAlani");
        cAlan.innerHTML = "<b>✅ Çözüm:</b><br>" + sakliCevap;
        cAlan.style.display = "block";
        document.getElementById("cevapBtn").style.display = "none";
    }

    // İSİMLİ GLOBAL SOHBET
    function mesajGonder() {
        const ad = document.getElementById("userName").value || "Anonim";
        const msg = document.getElementById("chatInput");
        if(!msg.value) return;
        
        document.getElementById("messageList").innerHTML += `<div class="msg-line"><b>${ad}:</b> ${msg.value}</div>`;
        msg.value = "";
        document.getElementById("messageList").scrollTop = document.getElementById("messageList").scrollHeight;
    }

    // AI ASİSTAN
    function toggleAI() {
        const box = document.getElementById("ai-box");
        box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    async function aiSor() {
        const inp = document.getElementById("aiMsgInput");
        const chat = document.getElementById("aiChat");
        if(!inp.value) return;
        
        chat.innerHTML += `<div><b>Siz:</b> ${inp.value}</div>`;
        const q = inp.value; inp.value = "";
        
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: "Türkçe konuşan asistan." }, { role: "user", content: q }]
                })
            });
            const d = await res.json();
            chat.innerHTML += `<div style="color:var(--accent)"><b>AI:</b> ${d.choices[0].message.content}</div>`;
            chat.scrollTop = chat.scrollHeight;
        } catch (e) { chat.innerHTML += "<div>Hata!</div>"; }
    }
</script>

</body>
</html>
